name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags "-X main.version=${GITHUB_REF_NAME#v}" -o rockbox-playlist-${{ matrix.goos }}-${{ matrix.goarch }} .

      - uses: actions/upload-artifact@v4
        with:
          name: rockbox-playlist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: rockbox-playlist-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract changelog for version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          awk "/^## \[${version}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/
          done
          gh release create "$tag" release/* \
            --title "$tag" \
            --notes-file release_notes.md
